        <p>Alongside my corporate responsibilities, I am actively involved in academia as a lecturer in Cyber Threat Intelligence at the University of Rome Tor Vergata and other institutions, contributing to the development of next-generation cybersecurity professionals. As a Ph.D. researcher in Cyber Threat Intelligence at the University of Sannio, my work investigates threat actor behaviors, ransomware business models, and dark web ecosystems. I have authored research on threat detection platforms and underground market analysis, and regularly speak at conferences on emerging trends in cybercrime.</p>
      </section>`,
      research: `<section class="text-center"><h2>Research</h2><p>My recent research focuses on infostealers, ransomware, and threat intelligence platforms. I actively contribute to conferences and publish works on cyber threats, underground ecosystems, and the evolution of malware economy.</p></section>`,
